<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- Grid dots -->
  <g fill="#ffffff" opacity="0.08">
    <circle cx="80" cy="60" r="2"/><circle cx="160" cy="60" r="2"/><circle cx="240" cy="60" r="2"/><circle cx="320" cy="60" r="2"/><circle cx="400" cy="60" r="2"/><circle cx="480" cy="60" r="2"/><circle cx="560" cy="60" r="2"/><circle cx="640" cy="60" r="2"/><circle cx="720" cy="60" r="2"/>
    <circle cx="80" cy="130" r="2"/><circle cx="160" cy="130" r="2"/><circle cx="240" cy="130" r="2"/><circle cx="320" cy="130" r="2"/><circle cx="400" cy="130" r="2"/><circle cx="480" cy="130" r="2"/><circle cx="560" cy="130" r="2"/><circle cx="640" cy="130" r="2"/><circle cx="720" cy="130" r="2"/>
    <circle cx="80" cy="200" r="2"/><circle cx="160" cy="200" r="2"/><circle cx="240" cy="200" r="2"/><circle cx="320" cy="200" r="2"/><circle cx="400" cy="200" r="2"/><circle cx="480" cy="200" r="2"/><circle cx="560" cy="200" r="2"/><circle cx="640" cy="200" r="2"/><circle cx="720" cy="200" r="2"/>
    <circle cx="80" cy="270" r="2"/><circle cx="160" cy="270" r="2"/><circle cx="240" cy="270" r="2"/><circle cx="320" cy="270" r="2"/><circle cx="400" cy="270" r="2"/><circle cx="480" cy="270" r="2"/><circle cx="560" cy="270" r="2"/><circle cx="640" cy="270" r="2"/><circle cx="720" cy="270" r="2"/>
    <circle cx="80" cy="340" r="2"/><circle cx="160" cy="340" r="2"/><circle cx="240" cy="340" r="2"/><circle cx="320" cy="340" r="2"/><circle cx="400" cy="340" r="2"/><circle cx="480" cy="340" r="2"/><circle cx="560" cy="340" r="2"/><circle cx="640" cy="340" r="2"/><circle cx="720" cy="340" r="2"/>
    <circle cx="80" cy="410" r="2"/><circle cx="160" cy="410" r="2"/><circle cx="240" cy="410" r="2"/><circle cx="320" cy="410" r="2"/><circle cx="400" cy="410" r="2"/><circle cx="480" cy="410" r="2"/><circle cx="560" cy="410" r="2"/><circle cx="640" cy="410" r="2"/><circle cx="720" cy="410" r="2"/>
  </g>

  <!-- Connection lines (neural network style) -->
  <g opacity="0.3" stroke="#f093fb" stroke-width="1">
    <line x1="120" y1="150" x2="260" y2="120"/><line x1="120" y1="150" x2="260" y2="180"/><line x1="120" y1="150" x2="260" y2="240"/>
    <line x1="120" y1="225" x2="260" y2="120"/><line x1="120" y1="225" x2="260" y2="180"/><line x1="120" y1="225" x2="260" y2="240"/>
    <line x1="120" y1="300" x2="260" y2="120"/><line x1="120" y1="300" x2="260" y2="180"/><line x1="120" y1="300" x2="260" y2="240"/>
    <line x1="300" y1="120" x2="440" y2="150"/><line x1="300" y1="120" x2="440" y2="225"/><line x1="300" y1="120" x2="440" y2="300"/>
    <line x1="300" y1="180" x2="440" y2="150"/><line x1="300" y1="180" x2="440" y2="225"/><line x1="300" y1="180" x2="440" y2="300"/>
    <line x1="300" y1="240" x2="440" y2="150"/><line x1="300" y1="240" x2="440" y2="225"/><line x1="300" y1="240" x2="440" y2="300"/>
  </g>

  <!-- Neural network nodes -->
  <g filter="url(#glow)">
    <circle cx="120" cy="150" r="14" fill="#f093fb" opacity="0.9"/>
    <circle cx="120" cy="225" r="14" fill="#f093fb" opacity="0.9"/>
    <circle cx="120" cy="300" r="14" fill="#f093fb" opacity="0.9"/>
    <circle cx="300" cy="120" r="14" fill="#4facfe" opacity="0.9"/>
    <circle cx="300" cy="180" r="14" fill="#4facfe" opacity="0.9"/>
    <circle cx="300" cy="240" r="14" fill="#4facfe" opacity="0.9"/>
    <circle cx="440" cy="150" r="14" fill="#43e97b" opacity="0.9"/>
    <circle cx="440" cy="225" r="14" fill="#43e97b" opacity="0.9"/>
    <circle cx="440" cy="300" r="14" fill="#43e97b" opacity="0.9"/>
  </g>

  <!-- Scatter points (high-dim data points) -->
  <g opacity="0.85">
    <circle cx="580" cy="130" r="7" fill="#f5576c"/>
    <circle cx="610" cy="110" r="7" fill="#f5576c"/>
    <circle cx="600" cy="155" r="7" fill="#f5576c"/>
    <circle cx="625" cy="140" r="7" fill="#f5576c"/>
    <circle cx="590" cy="170" r="7" fill="#f5576c"/>
    <circle cx="660" cy="250" r="7" fill="#4facfe"/>
    <circle cx="690" cy="270" r="7" fill="#4facfe"/>
    <circle cx="670" cy="300" r="7" fill="#4facfe"/>
    <circle cx="700" cy="240" r="7" fill="#4facfe"/>
    <circle cx="685" cy="290" r="7" fill="#4facfe"/>
    <!-- Decision boundary -->
    <line x1="530" y1="310" x2="730" y2="90" stroke="#ffdd57" stroke-width="2.5" stroke-dasharray="8,4"/>
  </g>

  <!-- Title text -->
  <text x="400" y="385" fill="white" font-family="Georgia, serif" font-size="28" font-weight="bold" text-anchor="middle" filter="url(#glow)">Everything in AI is Geometry</text>
  <text x="400" y="420" fill="#b3b3cc" font-family="Georgia, serif" font-size="16" text-anchor="middle">Vectors · Manifolds · High-Dimensional Space · Deep Learning</text>
</svg>
